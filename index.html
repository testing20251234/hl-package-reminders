<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Package Expiry Worklist · House Longevity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f1ea; --card:#fffdf9; --ink:#2a2018; --muted:#8a7c6c; --line:#e4d9c8;
    --accent:#8b5a3c; --accent-soft:#f0e4d8; --red:#b4452f; --red-bg:#f6dcd4;
    --amber:#b07d2a; --amber-bg:#f6e8cc; --green:#5d7a4f; --green-bg:#e6eddf;
    --radius:15px; --serif:'Newsreader',Iowan,Charter,Georgia,serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);
       font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 80px}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  h1{font-size:26px;font-weight:600;margin:0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:14.5px;margin:2px 0 18px}
  .who{font-size:13.5px;color:var(--muted)}
  .who a{cursor:pointer;text-decoration:underline}
  button{font-family:var(--serif);cursor:pointer}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:14.5px}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:13px;border-radius:8px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  /* tabs */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
  .tab{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 15px;font-size:15px;color:var(--ink)}
  .tab .n{display:inline-block;min-width:20px;margin-left:7px;padding:1px 7px;border-radius:20px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:600}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab.active .n{background:rgba(255,255,255,.25);color:#fff}
  .filters{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:13.5px;color:var(--muted)}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--ink)}
  .chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
  /* rows */
  .row{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;
       box-shadow:0 1px 2px rgba(139,90,60,.05);overflow:hidden}
  .row-head{display:grid;grid-template-columns:74px 1fr auto;gap:14px;align-items:center;padding:13px 16px;cursor:pointer}
  .days{text-align:center;border-radius:10px;padding:6px 4px;font-weight:600;background:var(--accent-soft);color:var(--accent);line-height:1.15}
  .days small{display:block;font-size:11px;font-weight:400;color:var(--muted)}
  .days.red{background:var(--red-bg);color:var(--red)} .days.amber{background:var(--amber-bg);color:var(--amber)}
  .who-name{font-size:17px;font-weight:600}
  .meta{font-size:13.5px;color:var(--muted);margin-top:1px}
  .badge{display:inline-block;font-size:11.5px;padding:2px 9px;border-radius:20px;border:1px solid var(--line);margin-right:5px;vertical-align:middle}
  .badge.expiry{background:var(--amber-bg);color:var(--amber);border-color:transparent}
  .badge.low{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  .badge.both{background:var(--red-bg);color:var(--red);border-color:transparent}
  .badge.upcoming{background:#ece4d8;color:var(--muted);border-color:transparent}
  .stage-pill{font-size:12px;color:var(--muted);white-space:nowrap}
  /* detail */
  .detail{border-top:1px solid var(--line);padding:16px;display:none;background:#fffefb}
  .detail.open{display:block}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:14px}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
  .fld input,.fld select,.fld textarea{width:100%;font-family:var(--serif);font-size:14px;padding:7px 9px;
       border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
  .msg{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px;white-space:pre-wrap;margin-bottom:12px}
  .actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .stamp{font-size:12.5px;color:var(--muted)}
  .wa{background:#1f8a4c;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:14.5px;text-decoration:none;display:inline-flex;gap:6px;align-items:center}
  .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:15px}
  .laterbar{cursor:pointer;color:var(--muted);font-size:13.5px;padding:12px 4px 8px;user-select:none;border-top:1px dashed var(--line);margin-top:6px}
  .laterbar:hover{color:var(--accent)}
  .later .row{opacity:.6}
  /* login */
  .login{max-width:380px;margin:9vh auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:30px 28px;text-align:center;box-shadow:0 4px 16px rgba(139,90,60,.08)}
  .login h2{font-weight:600;margin:0 0 6px} .login p{color:var(--muted);font-size:14px;margin:0 0 18px}
  .login input{width:100%;padding:11px 13px;font-size:15px;font-family:var(--serif);border:1px solid var(--line);border-radius:10px;margin-bottom:11px}
  .login .btn{width:100%}
  .note{font-size:12.5px;color:var(--muted);margin-top:14px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .warn{background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:12px;padding:11px 14px;margin:0 0 14px;font-size:14px;line-height:1.45}
  .warn b{font-weight:600}
  .hidden{display:none}
</style>
</head>
<body>
<div id="login" class="login hidden">
  <h2>Package Expiry Worklist</h2>
  <p>Staff sign-in.</p>
  <input id="email" type="email" value="sbhadmin@houselongevity.com" autocomplete="username">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password"
         onkeydown="if(event.key==='Enter')signIn()">
  <button class="btn" onclick="signIn()">Sign in</button>
  <div class="note" id="loginNote"></div>
</div>

<div id="app" class="wrap hidden">
  <header>
    <div>
      <h1>Package Expiry Worklist</h1>
      <div class="sub" id="sub">Loading…</div>
    </div>
    <div class="who">Your initials: <input id="who" placeholder="e.g. ZW" style="width:64px;padding:3px 7px;border:1px solid var(--line);border-radius:7px;font-family:var(--serif)" oninput="localStorage.setItem('who',this.value)"> · <a href="promo.html">Bring-a-Friend promo →</a> · <a onclick="signOut()">sign out</a></div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="filters">
    <span>Reason:</span>
    <span class="chip active" data-reason="" onclick="setReason('')">All</span>
    <span class="chip" data-reason="Expiry" onclick="setReason('Expiry')">Expiry</span>
    <span class="chip" data-reason="Low-credit" onclick="setReason('Low-credit')">Low-credit</span>
    <span class="chip" data-reason="Both" onclick="setReason('Both')">Both</span>
    <span class="chip" data-reason="Upcoming" onclick="setReason('Upcoming')">Upcoming</span>
    <span style="margin-left:auto"><button class="btn ghost sm" onclick="load()">↻ Refresh</button></span>
  </div>
  <div id="warnbar"></div>
  <div id="list"></div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://geheirnfbhqnhrjmrrax.supabase.co";
const SUPABASE_KEY = "sb_publishable_gA4Ag-16NUpoObMUqBU4RA_Xe0BrRwM";
const REPLY = "8989 8525";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STAGES = ["1·Precheck","2·Ready to send","3·Sent","Skip"];
// Tab bar order. "Early sent" is a VIRTUAL tab (not a real stage) — the in-flight
// cohort whose early reminder went out and whose final one is still pending.
const TABS = ["1·Precheck","2·Ready to send","Early sent","3·Sent","Skip"];
// early reminder sent, final not yet, and not currently due (those jump back to Ready)
function isEarlyWaiting(r){ return r.stage==='2·Ready to send' && r.nudge_14_sent_at && !r.nudge_7_sent_at && !r.due; }
const STATUS_OPTS = ["","Extended","Superseded","Already expired","Sessions used up","Cancelled/Refunded","Other"];
const OUTCOME_OPTS = ["","Booked","Upgraded-20pack","Upgraded-membership","Not interested","No response","Wrong number"];
const PACK_OPTS = ["","SBH First Timer","SBH 5-Pack","SBH 10-Pack","SBH 20-Pack","SBH 50-Pack","20-Pack $388","RLT 10-Pack","RLT 20-Pack","RLT 50-Pack","HBOT 5-Pack","HBOT 10-Pack","Off-Peak Unlimited","Full Unlimited","Other"];

let ROWS = [], TAB = "1·Precheck", REASON = "", ME = "", SHOW_LATER = false;
let SENT_TODAY = 0;                 // combined WhatsApp sends today (expiry + promo), SGT
const WARN_AT = 50;                 // ban-safety brake: warn staff past this many/day
const MIN_GAP_SECONDS = 45;         // pacing: nudge staff to space sends ~45s apart
let LAST_SEND_TS = 0;               // time of last send this session (for pacing)

/* ---------- auth ---------- */
async function init(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){ showApp(session); } else { document.getElementById('login').classList.remove('hidden'); }
  sb.auth.onAuthStateChange((_e,s)=>{ if(s){ showApp(s);} });
}
function showApp(session){
  ME = session.user.email;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const w = document.getElementById('who'); if(w) w.value = localStorage.getItem('who') || '';
  load();
}
async function signIn(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){ document.getElementById('loginNote').textContent = "Enter email and password."; return; }
  const {error} = await sb.auth.signInWithPassword({email, password});
  if(error) document.getElementById('loginNote').textContent = "Error: " + error.message;
}
// who did the work — initials if given (shared login), else the account email
function who(){ const v=(document.getElementById('who')?.value||'').trim(); return v || ME; }
async function signOut(){ await sb.auth.signOut(); location.reload(); }

/* ---------- data ---------- */
async function load(){
  const {data,error} = await sb.from('reminder_worklist').select('*');
  if(error){ toast("Load error: "+error.message); return; }
  ROWS = data || [];
  await refreshSentToday();
  renderTabs(); render();
}
// combined daily send count across BOTH pages (ban risk is per WhatsApp number)
async function refreshSentToday(){
  const {data:sc} = await sb.from('daily_send_count').select('*').maybeSingle();
  SENT_TODAY = sc ? ((sc.expiry_sent||0) + (sc.promo_sent||0)) : 0;
  updateWarnbar();
}
function updateWarnbar(){
  const el = document.getElementById('warnbar'); if(!el) return;
  el.innerHTML = SENT_TODAY >= WARN_AT
    ? `<div class="warn">⚠️ <b>${SENT_TODAY}</b> WhatsApp messages already sent today from this number (expiry + promo combined). WhatsApp flags high daily volume from one number — <b>consider pausing and continuing tomorrow</b>.</div>`
    : '';
}
// Ready-to-send tab shows the actionable (due-now) count; Early sent shows the
// in-flight cohort; others show their stage size.
function tabCount(s){
  if(s==='2·Ready to send') return ROWS.filter(r=>r.stage===s && r.due).length;
  if(s==='Early sent') return ROWS.filter(isEarlyWaiting).length;
  return ROWS.filter(r=>r.stage===s).length;
}
function renderTabs(){
  const labels = {"1·Precheck":"1 · Precheck","2·Ready to send":"2 · Ready to send","Early sent":"Early sent","3·Sent":"3 · Done","Skip":"Skip"};
  document.getElementById('tabs').innerHTML = TABS.map(s=>
    `<button class="tab ${s===TAB?'active':''}" onclick="setTab('${s}')">${labels[s]}<span class="n">${tabCount(s)}</span></button>`
  ).join('');
  const dueNow = ROWS.filter(r=>r.due).length;
  const armed  = ROWS.filter(r=>r.stage==='2·Ready to send').length;
  const cntCol = SENT_TODAY >= WARN_AT ? 'var(--red)' : 'var(--muted)';
  document.getElementById('sub').innerHTML = `${ROWS.length} active packs · ${armed} in send queue · <b>${dueNow}</b> to send now (early @14d, final @7d) · soonest first`
    + ` · <span style="color:${cntCol}">sent today (all): <b>${SENT_TODAY}</b>/${WARN_AT}</span>`;
}
function setTab(s){ TAB=s; renderTabs(); render(); }
function setReason(r){ REASON=r; document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.reason===r)); render(); }

/* ---------- message (mirrors the pipeline) ---------- */
function firstName(n){ return (n||"").trim().split(" ")[0] || "there"; }
function pretty(iso){ if(!iso) return ""; const [y,m,d]=iso.split("-");
  const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${+d} ${M[+m-1]} ${y}`; }
const OFFERS = "Until 19 June, bring a friend during off-peak hours (Mon–Fri, just exit by 5pm) and your entry is free — your friend just pays $27.50 instead of $55, or picks up any package. You can also upgrade to our 20-session pack ($388) or go unlimited with our Off-Peak Unlimited membership ($200/mo) while your pack's still active. Reply here or message us on "+REPLY+" to find out more — and if we've gotten anything wrong or there's any issue, do let us know, we're always here to help. See you in the heat.";
// App links — kept OUTSIDE the OFFERS string so the 9-Jun promo auto-strip (trig_01VDdXbmap3W9QBEdcJky98F) never touches them.
const APP_IOS = "https://apps.apple.com/au/app/house-longevity-x-sbh/id6761812350";
const APP_ANDROID = "https://play.google.com/store/apps/details?id=com.hapana.houselongevitysaunabath";
const APP_TIP = "\n\nP.S. The easiest way to check your expiry and remaining sessions anytime is our app — Apple: "+APP_IOS+" · Android: "+APP_ANDROID;
function message(r){
  const pk=(r.pack||"").split(" (")[0], nm=firstName(r.customer), exp=pretty(r.effective_expiry);
  let lead;
  if(r.reason==="Both") lead=`A quick reminder that your ${pk} expires on ${exp} — and it looks like you're down to your last session or two. Pop in to make the most of them before then! `;
  else if(r.reason==="Low-credit") lead=`Hope you've been enjoying the heat! It looks like you're down to your last session or two on your ${pk} — pop in to make the most of them while your pack is active. `;
  else lead=`A quick reminder that your ${pk} expires on ${exp}. There's still time to enjoy your remaining sessions before then! `;
  return `Hi ${nm}! This is Sauna Bath House. `+lead+OFFERS+APP_TIP;
}

/* ---------- render ---------- */
function daysCell(d){
  const cls = d<=0?'red':d<=7?'amber':'';
  const lbl = d<0?`${-d}d`:d+'d';
  const sub = d<0?'overdue':d===0?'today':'left';
  return `<div class="days ${cls}">${lbl}<small>${sub}</small></div>`;
}
function badge(reason){ const c={Expiry:'expiry','Low-credit':'low',Both:'both',Upcoming:'upcoming'}[reason]||'upcoming';
  return `<span class="badge ${c}">${reason||'—'}</span>`; }

// short status hint per row (which reminder is due / sent / scheduled)
function pill(r){
  if(r.stage==='3·Sent') return 'done';
  if(r.due) return r.tier==='nudge_7' ? 'final reminder due' : 'early reminder due';
  if(r.nudge_14_sent_at) return 'early sent · final ~7d';
  if(r.stage==='2·Ready to send') return 'scheduled';
  if(r.checked_by) return 'checked ' + esc(r.checked_by.split('@')[0]);
  return '▾';
}
function rowHTML(r){
  const credit = r.credits_left!=null ? `${r.credits_left} of ${r.pack_size} left` : (r.usage_label||'');
  const contact = r.confirmed_phone||r.phone ? (r.confirmed_phone||r.phone) : (r.confirmed_email||r.email||'no contact');
  return `<div class="row" data-id="${r.invoice_no}">
    <div class="row-head" onclick="toggle('${r.invoice_no}')">
      ${daysCell(r.days_left)}
      <div><div class="who-name">${esc(r.customer)}</div>
        <div class="meta">${badge(r.reason)}${esc((r.pack||'').split(' (')[0])} · ${esc(credit)} · ${esc(contact)}</div></div>
      <div class="stage-pill">${pill(r)}</div>
    </div>
    <div class="detail" id="d-${r.invoice_no}"></div>
  </div>`;
}
function toggleLater(){ SHOW_LATER=!SHOW_LATER; render(); }
function render(){
  let rows = TAB==='Early sent' ? ROWS.filter(isEarlyWaiting) : ROWS.filter(r=>r.stage===TAB);
  if(REASON) rows = rows.filter(r=>r.reason===REASON);
  rows.sort((a,b)=>a.days_left-b.days_left);
  const list = document.getElementById('list');

  // Send queue: surface only what's DUE now; never-contacted packs wait behind a
  // toggle and re-surface on their own at 14d. Early-sent packs have their own tab,
  // so they're excluded from the "later" list here.
  if(TAB==='2·Ready to send'){
    const dueRows = rows.filter(r=>r.due), later = rows.filter(r=>!r.due && !isEarlyWaiting(r));
    let html = dueRows.length ? dueRows.map(rowHTML).join('')
      : `<div class="empty">Nothing to send right now${REASON?` for “${REASON}”`:''}. 🎉</div>`;
    if(later.length){
      html += `<div class="laterbar" onclick="toggleLater()">${SHOW_LATER?'▾':'▸'} ${later.length} scheduled for later (not yet in window)</div>`;
      if(SHOW_LATER) html += `<div class="later">${later.map(rowHTML).join('')}</div>`;
    }
    list.innerHTML = html;
    return;
  }

  // Early sent: contacted once, final reminder still pending. They auto-return to
  // "Ready to send" ~7 days before expiry — this is a read-only holding view.
  if(TAB==='Early sent'){
    list.innerHTML = rows.length
      ? `<div style="color:var(--muted);font-size:13px;padding:2px 4px 12px">Early reminder sent · the final one surfaces in “Ready to send” on its own ~7 days before expiry.</div>`
        + rows.map(rowHTML).join('')
      : `<div class="empty">No one's mid-cadence right now${REASON?` for “${REASON}”`:''}. 🎉</div>`;
    return;
  }

  if(!rows.length){ list.innerHTML = `<div class="empty">Nothing in this stage${REASON?` for “${REASON}”`:''}. 🎉</div>`; return; }
  list.innerHTML = rows.map(rowHTML).join('');
}
function toggle(id){
  const d=document.getElementById('d-'+id); const r=ROWS.find(x=>x.invoice_no===id);
  if(d.classList.contains('open')){ d.classList.remove('open'); d.innerHTML=''; return; }
  document.querySelectorAll('.detail.open').forEach(x=>{x.classList.remove('open');x.innerHTML='';});
  d.classList.add('open'); d.innerHTML = detailHTML(r); d.classList.add('open');
}
function fld(label,inner){ return `<div class="fld"><label>${label}</label>${inner}</div>`; }
function opts(arr,sel){ return arr.map(o=>`<option ${o===sel?'selected':''}>${o}</option>`).join(''); }

function scheduleHint(r){
  if(r.nudge_14_sent_at) return 'Early reminder sent — the final one surfaces here on its own ~7 days before expiry.';
  if(r.days_left>14) return `Scheduled — surfaces for the early reminder in ${r.days_left-14} day(s) (14 days before expiry).`;
  return 'Scheduled.';
}
function nudgeHistory(r){
  const b=[];
  if(r.nudge_14_sent_at) b.push(`early reminder sent ${r.nudge_14_sent_at.slice(0,10)} by ${esc((r.nudge_14_sent_by||'').split('@')[0])}`);
  if(r.nudge_7_sent_at)  b.push(`final reminder sent ${r.nudge_7_sent_at.slice(0,10)} by ${esc((r.nudge_7_sent_by||'').split('@')[0])}`);
  return b.length ? `<div class="stamp" style="margin-top:9px">✓ ${b.join(' · ')}</div>` : '';
}
function detailHTML(r){
  const phone=(r.confirmed_phone||r.phone||''); const email=(r.confirmed_email||r.email||'');
  const waNum=(phone||'').replace(/[^0-9]/g,'');
  const waLink = waNum ? `https://wa.me/${waNum}?text=${encodeURIComponent(message(r))}` : '';
  const sendable = r.stage==='2·Ready to send' && r.due;
  const nudgeLabel = r.tier==='nudge_7' ? 'Mark final reminder sent →' : 'Mark early reminder sent →';
  return `
  <div class="grid">
    ${fld('Valid? (estimate correct)', `<select id="f-valid-${r.invoice_no}">${opts(['','Yes','No'], r.valid===true?'Yes':r.valid===false?'No':'')}</select>`)}
    ${fld('If not valid — status', `<select id="f-status-${r.invoice_no}">${opts(STATUS_OPTS, r.not_valid_status||'')}</select>`)}
    ${fld('Superseded by', `<select id="f-sup-${r.invoice_no}">${opts(PACK_OPTS, r.superseded_by||'')}</select>`)}
    ${fld('Corrected expiry', `<input type="date" id="f-cexp-${r.invoice_no}" value="${r.corrected_expiry||''}">`)}
    ${fld('Confirm phone', `<input id="f-phone-${r.invoice_no}" value="${esc(phone)}" placeholder="—">`)}
    ${fld('Confirm email', `<input id="f-email-${r.invoice_no}" value="${esc(email)}" placeholder="—">`)}
  </div>
  <div class="msg">${esc(message(r))}</div>
  <div class="actions">
    ${r.stage==='1·Precheck' ? `<button class="btn" onclick="precheckDone('${r.invoice_no}')">✓ Precheck done → send queue</button>`:''}
    ${sendable ? (waLink?`<a class="wa" href="${waLink}" target="_blank" rel="noopener">📲 Open WhatsApp</a>`:`<span class="stamp">No phone — use email: ${esc(email)||'none'}</span>`) : ''}
    ${sendable ? `<select id="f-out-${r.invoice_no}" style="padding:7px 9px;border-radius:9px;border:1px solid var(--line)">${opts(OUTCOME_OPTS,'')}</select><button class="btn" onclick="markSent('${r.invoice_no}')">${nudgeLabel}</button>`:''}
    ${r.stage==='2·Ready to send' && !r.due ? `<span class="stamp">${scheduleHint(r)}</span>`:''}
    ${r.stage==='3·Sent' ? `<span class="stamp">Done · outcome: <b>${esc(r.outcome||'—')}</b></span>`:''}
    <button class="btn ghost sm" onclick="saveFields('${r.invoice_no}')">Save fields</button>
    ${r.stage!=='Skip' ? `<button class="btn ghost sm" onclick="setStage('${r.invoice_no}','Skip')">Skip</button>`:`<button class="btn ghost sm" onclick="setStage('${r.invoice_no}','1·Precheck')">Un-skip</button>`}
    ${fldNotesInline(r)}
  </div>
  ${nudgeHistory(r)}`;
}
function fldNotesInline(r){ return `<input id="f-notes-${r.invoice_no}" value="${esc(r.notes||'')}" placeholder="notes…" style="flex:1;min-width:160px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;font-family:var(--serif)">`; }

/* ---------- writes ---------- */
function v(id){ const e=document.getElementById(id); return e?e.value:undefined; }
function collect(id){
  const valSel=v('f-valid-'+id);
  return {
    valid: valSel==='Yes'?true:valSel==='No'?false:null,
    not_valid_status: v('f-status-'+id)||null,
    superseded_by: v('f-sup-'+id)||null,
    corrected_expiry: v('f-cexp-'+id)||null,
    confirmed_phone: v('f-phone-'+id)||null,
    confirmed_email: v('f-email-'+id)||null,
    notes: v('f-notes-'+id)||null,
  };
}
async function upsert(id, patch){
  patch.invoice_no = id; patch.updated_at = new Date().toISOString();
  const {error} = await sb.from('reminder_state').upsert(patch, {onConflict:'invoice_no'});
  if(error){ toast("Save error: "+error.message); return false; }
  return true;
}
async function saveFields(id){ if(await upsert(id, collect(id))){ toast("Saved"); await load(); } }
async function setStage(id, stage){ if(await upsert(id, {...collect(id), stage})){ toast("→ "+stage); await load(); } }
async function precheckDone(id){
  const p = collect(id); if(p.valid===null) p.valid=true;
  p.stage='2·Ready to send'; p.checked_by=who(); p.checked_at=new Date().toISOString();
  if(await upsert(id,p)){ toast("Precheck done → Ready"); await load(); }
}
// pacing nudge: discourage rapid-fire sends (looks like spam to WhatsApp)
function paceOk(){
  const gap = (Date.now()-LAST_SEND_TS)/1000;
  if(LAST_SEND_TS && gap < MIN_GAP_SECONDS)
    return confirm(`Only ${Math.round(gap)}s since your last send. Sending too fast looks like spam to WhatsApp — best to wait ~${MIN_GAP_SECONDS}s between messages.\n\nSend anyway?`);
  return true;
}
async function markSent(id){
  if(!paceOk()) return;
  if(SENT_TODAY >= WARN_AT && !confirm(`You've already sent ${SENT_TODAY} WhatsApp messages today from this number (expiry + promo combined).\n\nSending more raises the risk WhatsApp flags or bans the number. Send anyway?`)) return;
  const r = ROWS.find(x=>x.invoice_no===id);
  const p = collect(id);
  const now = new Date().toISOString(), me = who();
  LAST_SEND_TS = Date.now();
  // tier from days_left: <=7 is the final reminder, else the early one
  const tier = (r && r.days_left<=7) ? 'nudge_7' : 'nudge_14';
  if(tier==='nudge_7'){ p.nudge_7_sent_at=now; p.nudge_7_sent_by=me; p.stage='3·Sent'; }
  else { p.nudge_14_sent_at=now; p.nudge_14_sent_by=me; }   // stays armed; resurfaces ~7d before expiry
  p.sent_at=now; p.sent_by=me; p.outcome=v('f-out-'+id)||null;
  if(await upsert(id,p)){ toast(tier==='nudge_7'?'Final reminder sent — done ✓':'Early reminder sent — final one surfaces ~7d before expiry'); await load(); }
}

/* ---------- util ---------- */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastT; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

init();
</script>
