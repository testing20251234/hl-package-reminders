<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bring-a-Friend Promo · House Longevity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f1ea; --card:#fffdf9; --ink:#2a2018; --muted:#8a7c6c; --line:#e4d9c8;
    --accent:#8b5a3c; --accent-soft:#f0e4d8; --red:#b4452f; --red-bg:#f6dcd4;
    --amber:#b07d2a; --amber-bg:#f6e8cc; --green:#5d7a4f; --green-bg:#e6eddf;
    --radius:15px; --serif:'Newsreader',Iowan,Charter,Georgia,serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);
       font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 80px}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  h1{font-size:26px;font-weight:600;margin:0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:14.5px;margin:2px 0 18px}
  .who{font-size:13.5px;color:var(--muted)}
  .who a{cursor:pointer;text-decoration:underline}
  button{font-family:var(--serif);cursor:pointer}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:14.5px}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:13px;border-radius:8px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
  .tab{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 15px;font-size:15px;color:var(--ink)}
  .tab .n{display:inline-block;min-width:20px;margin-left:7px;padding:1px 7px;border-radius:20px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:600}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab.active .n{background:rgba(255,255,255,.25);color:#fff}
  .filters{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:13.5px;color:var(--muted)}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--ink);cursor:pointer}
  .chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
  .row{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;
       box-shadow:0 1px 2px rgba(139,90,60,.05);overflow:hidden}
  .row-head{display:grid;grid-template-columns:78px 1fr auto;gap:14px;align-items:center;padding:13px 16px;cursor:pointer}
  .tag{text-align:center;border-radius:10px;padding:6px 4px;font-weight:600;font-size:13px;background:var(--green-bg);color:var(--green);line-height:1.2}
  .tag.lapsed{background:var(--accent-soft);color:var(--accent)}
  .who-name{font-size:17px;font-weight:600}
  .meta{font-size:13.5px;color:var(--muted);margin-top:1px}
  .stage-pill{font-size:12px;color:var(--muted);white-space:nowrap}
  .detail{border-top:1px solid var(--line);padding:16px;display:none;background:#fffefb}
  .detail.open{display:block}
  .msg{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px;white-space:pre-wrap;margin-bottom:12px}
  .actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .stamp{font-size:12.5px;color:var(--muted)}
  .wa{background:#1f8a4c;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:14.5px;text-decoration:none;display:inline-flex;gap:6px;align-items:center}
  .empty{text-align:center;color:var(--muted);padding:50px 0;font-size:15px}
  .login{max-width:380px;margin:9vh auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:30px 28px;text-align:center;box-shadow:0 4px 16px rgba(139,90,60,.08)}
  .login h2{font-weight:600;margin:0 0 6px} .login p{color:var(--muted);font-size:14px;margin:0 0 18px}
  .login input{width:100%;padding:11px 13px;font-size:15px;font-family:var(--serif);border:1px solid var(--line);border-radius:10px;margin-bottom:11px}
  .login .btn{width:100%}
  .note{font-size:12.5px;color:var(--muted);margin-top:14px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .warn{background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:12px;padding:11px 14px;margin:0 0 14px;font-size:14px;line-height:1.45}
  .warn b{font-weight:600}
  .hidden{display:none}
</style>
</head>
<body>
<div id="login" class="login hidden">
  <h2>Bring-a-Friend Promo</h2>
  <p>Staff sign-in.</p>
  <input id="email" type="email" value="sbhadmin@houselongevity.com" autocomplete="username">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password"
         onkeydown="if(event.key==='Enter')signIn()">
  <button class="btn" onclick="signIn()">Sign in</button>
  <div class="note" id="loginNote"></div>
</div>

<div id="app" class="wrap hidden">
  <header>
    <div>
      <h1>Bring-a-Friend Promo</h1>
      <div class="sub" id="sub">Loading…</div>
    </div>
    <div class="who">Your initials: <input id="who" placeholder="e.g. ZW" style="width:64px;padding:3px 7px;border:1px solid var(--line);border-radius:7px;font-family:var(--serif)" oninput="localStorage.setItem('who',this.value)"> · <a href="index.html">Expiry worklist</a> · <a href="redeem.html">☕ Coffee redemption</a> · <a onclick="signOut()">sign out</a></div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="filters">
    <span>Show:</span>
    <span class="chip active" data-who="" onclick="setWho('')">All</span>
    <span class="chip" data-who="active" onclick="setWho('active')">Active pack</span>
    <span class="chip" data-who="lapsed" onclick="setWho('lapsed')">Lapsed</span>
    <span style="margin-left:auto"><button class="btn ghost sm" onclick="load()">↻ Refresh</button></span>
  </div>
  <div id="warnbar"></div>
  <div id="list"></div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://geheirnfbhqnhrjmrrax.supabase.co";
const SUPABASE_KEY = "sb_publishable_gA4Ag-16NUpoObMUqBU4RA_Xe0BrRwM";
const REPLY = "8989 8525";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STAGES = ["To send","No phone","Sent","Skip"];

let ROWS = [], TAB = "To send", WHO = "", ME = "", OPEN = null;
let SENT_TODAY = 0;                 // combined WhatsApp sends today (expiry + promo), SGT
const WARN_AT = 50;                 // ban-safety brake: warn staff past this many/day
const MIN_GAP_SECONDS = 45;         // pacing: nudge staff to space sends ~45s apart
let LAST_SEND_TS = 0;               // time of last send this session (for pacing)

/* ---------- auth (same shared login as the expiry worklist) ---------- */
async function init(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){ showApp(session); } else { document.getElementById('login').classList.remove('hidden'); }
  sb.auth.onAuthStateChange((_e,s)=>{ if(s){ showApp(s);} });
}
function showApp(session){
  ME = session.user.email;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const w = document.getElementById('who'); if(w) w.value = localStorage.getItem('who') || '';
  load();
}
async function signIn(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){ document.getElementById('loginNote').textContent = "Enter email and password."; return; }
  const {error} = await sb.auth.signInWithPassword({email, password});
  if(error) document.getElementById('loginNote').textContent = "Error: " + error.message;
}
function who(){ const v=(document.getElementById('who')?.value||'').trim(); return v || ME; }
async function signOut(){ await sb.auth.signOut(); location.reload(); }

/* ---------- data ---------- */
async function load(){
  const {data,error} = await sb.from('promo_worklist').select('*');
  if(error){ toast("Load error: "+error.message); return; }
  ROWS = (data||[]).sort((a,b)=> (a.customer||'').localeCompare(b.customer||''));
  await refreshSentToday();
  renderTabs(); render();
}
// combined daily send count across BOTH pages (ban risk is per WhatsApp number)
async function refreshSentToday(){
  const {data:sc} = await sb.from('daily_send_count').select('*').maybeSingle();
  SENT_TODAY = sc ? ((sc.expiry_sent||0) + (sc.promo_sent||0)) : 0;
  updateWarnbar();
}
function updateWarnbar(){
  const el = document.getElementById('warnbar'); if(!el) return;
  el.innerHTML = SENT_TODAY >= WARN_AT
    ? `<div class="warn">⚠️ <b>${SENT_TODAY}</b> WhatsApp messages already sent today from this number (expiry + promo combined). WhatsApp flags high daily volume from one number — <b>consider pausing and continuing tomorrow</b>.</div>`
    : '';
}
function tabCount(s){ return ROWS.filter(r=>r.stage===s).length; }
function renderTabs(){
  document.getElementById('tabs').innerHTML = STAGES.map(s=>
    `<button class="tab ${s===TAB?'active':''}" onclick="setTab('${s}')">${s}<span class="n">${tabCount(s)}</span></button>`
  ).join('');
  const total = ROWS.length, tosend = tabCount('To send'), sent = tabCount('Sent');
  const cntCol = SENT_TODAY >= WARN_AT ? 'var(--red)' : 'var(--muted)';
  document.getElementById('sub').innerHTML =
    `${total} past & current pack-holders · <b>${tosend}</b> to send (WhatsApp) · ${sent} sent · promo runs through 8 Jun`
    + ` · <span style="color:${cntCol}">sent today (all): <b>${SENT_TODAY}</b>/${WARN_AT}</span>`;
}
function setTab(s){ TAB=s; OPEN=null; renderTabs(); render(); }
function setWho(w){ WHO=w; OPEN=null; document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.who===w)); render(); }

/* ---------- message (neutral win-back; buddy promo only, plain text) ---------- */
function firstName(n){ return (n||"").trim().split(" ")[0] || "there"; }
function message(r){
  const nm = firstName(r.customer);
  return `Hi ${nm}! This is Sauna Bath House. Thanks for coming down and giving the sauna a try — we'd love to see you back. `
       + `From now until 8 June we're running our Bring-a-Friend special: come in with a friend during off-peak hours `
       + `(Mon–Fri, just exit by 5pm) and your own entry is free — your friend pays just $27.50 instead of $55, or picks up any package. `
       + `A good reason to come share the heat with someone. Reply here or message us on ${REPLY} to find out more. `
       + `If you'd rather not receive offers like this, just reply STOP. See you in the heat.`
       + `\n\nP.S. Our app makes it easy to book and keep an eye on your sessions — Apple: https://apps.apple.com/au/app/house-longevity-x-sbh/id6761812350 · Android: https://play.google.com/store/apps/details?id=com.hapana.houselongevitysaunabath`;
}

/* ---------- render ---------- */
function pill(r){
  if(r.skip) return 'skipped';
  if(r.promo_sent_at) return 'sent ' + r.promo_sent_at.slice(0,10) + (r.promo_sent_by?(' · '+esc(r.promo_sent_by.split('@')[0])):'');
  return '▾';
}
function rowHTML(r,i){
  const pk = (r.pack||'').split(' (')[0];
  const contact = r.phone || r.email || 'no contact';
  const tag = r.has_active ? 'Active' : 'Lapsed';
  return `<div class="row">
    <div class="row-head" onclick="toggle(${i})">
      <div class="tag ${r.has_active?'':'lapsed'}">${tag}</div>
      <div><div class="who-name">${esc(r.customer)}</div>
        <div class="meta">${esc(pk)} · ${esc(contact)}</div></div>
      <div class="stage-pill">${pill(r)}</div>
    </div>
    <div class="detail ${OPEN===i?'open':''}" id="d-${i}">${OPEN===i?detailHTML(r,i):''}</div>
  </div>`;
}
function render(){
  let rows = ROWS.map((r,i)=>[r,i]).filter(([r])=>r.stage===TAB);
  if(WHO==='active') rows = rows.filter(([r])=>r.has_active);
  if(WHO==='lapsed') rows = rows.filter(([r])=>!r.has_active);
  const list = document.getElementById('list');
  if(!rows.length){ list.innerHTML = `<div class="empty">Nothing here${WHO?` for “${WHO}”`:''}. 🎉</div>`; return; }
  list.innerHTML = rows.map(([r,i])=>rowHTML(r,i)).join('');
}
function toggle(i){
  OPEN = (OPEN===i) ? null : i;
  render();
}
function detailHTML(r,i){
  const phone=(r.phone||''); const email=(r.email||'');
  const waNum=phone.replace(/[^0-9]/g,'');
  const waLink = waNum ? `https://wa.me/${waNum}?text=${encodeURIComponent(message(r))}` : '';
  const done = !!r.promo_sent_at;
  return `
  <div class="msg">${esc(message(r))}</div>
  <div class="actions">
    ${waLink ? `<a class="wa" href="${waLink}" target="_blank" rel="noopener">📲 Open WhatsApp</a>`
             : `<span class="stamp">No phone on file${email?` — email: ${esc(email)}`:''}</span>`}
    <button class="btn ghost sm" onclick="copyMsg(${i})">Copy message</button>
    ${!done ? `<button class="btn" onclick="markSent(${i})">✓ Mark sent</button>`
            : `<button class="btn ghost sm" onclick="unsend(${i})">Undo sent</button>`}
    ${!r.skip ? `<button class="btn ghost sm" onclick="setSkip(${i},true)">Skip</button>`
              : `<button class="btn ghost sm" onclick="setSkip(${i},false)">Un-skip</button>`}
    <input id="f-notes-${i}" value="${esc(r.notes||'')}" placeholder="notes…" style="flex:1;min-width:160px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;font-family:var(--serif)">
    <button class="btn ghost sm" onclick="saveNotes(${i})">Save note</button>
  </div>
  ${done ? `<div class="stamp" style="margin-top:9px">✓ sent ${r.promo_sent_at.slice(0,10)} by ${esc((r.promo_sent_by||'').split('@')[0])}</div>` : ''}`;
}

/* ---------- writes (promo_state, keyed on email) ---------- */
async function upsert(patch){
  patch.updated_at = new Date().toISOString();
  const {error} = await sb.from('promo_state').upsert(patch, {onConflict:'email'});
  if(error){ toast("Save error: "+error.message); return false; }
  return true;
}
function noteVal(i){ const e=document.getElementById('f-notes-'+i); return e?(e.value||null):undefined; }
// pacing nudge: discourage rapid-fire sends (looks like spam to WhatsApp)
function paceOk(){
  const gap = (Date.now()-LAST_SEND_TS)/1000;
  if(LAST_SEND_TS && gap < MIN_GAP_SECONDS)
    return confirm(`Only ${Math.round(gap)}s since your last send. Sending too fast looks like spam to WhatsApp — best to wait ~${MIN_GAP_SECONDS}s between messages.\n\nSend anyway?`);
  return true;
}
async function markSent(i){
  if(!paceOk()) return;
  if(SENT_TODAY >= WARN_AT && !confirm(`You've already sent ${SENT_TODAY} WhatsApp messages today from this number (expiry + promo combined).\n\nSending more raises the risk WhatsApp flags or bans the number. Send anyway?`)) return;
  const r = ROWS[i];
  if(await upsert({email:r.email, promo_sent_at:new Date().toISOString(), promo_sent_by:who(), notes:noteVal(i)})){
    LAST_SEND_TS = Date.now();
    toast(`Marked sent ✓ — wait ~${MIN_GAP_SECONDS}s before the next`); await load();
  }
}
async function unsend(i){
  const r = ROWS[i];
  if(await upsert({email:r.email, promo_sent_at:null, promo_sent_by:null})){ toast("Undone"); await load(); }
}
async function setSkip(i, skip){
  const r = ROWS[i];
  if(await upsert({email:r.email, skip, notes:noteVal(i)})){ toast(skip?'Skipped':'Un-skipped'); await load(); }
}
async function saveNotes(i){
  const r = ROWS[i];
  if(await upsert({email:r.email, notes:noteVal(i)})){ toast("Note saved"); }
}
async function copyMsg(i){
  try{ await navigator.clipboard.writeText(message(ROWS[i])); toast("Message copied"); }
  catch(e){ toast("Copy failed — select the text above"); }
}

/* ---------- util ---------- */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastT; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

init();
</script>
</body>
</html>
